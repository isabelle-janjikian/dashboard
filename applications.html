<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes applications Claude Code</title>
<style>

* { box-sizing: border-box; }
body {
  margin: 0;
  min-height: 100vh;
  font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
  color: #1c2b3a;
  position: relative;
  overflow-x: hidden;
}
.background {
  position: fixed;
  inset: 0;
  z-index: -1;
  background: linear-gradient(160deg, #5bc8f0 0%, #1f6fc2 100%);
  overflow: hidden;
}
.petal {
  position: absolute;
  filter: blur(2px);
}
.app-shell {
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 70px 80px;
}
h1 {
  color: #ffffff;
  text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
  font-size: 2rem;
  margin-bottom: 24px;
}
.nav-links {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.nav-link {
  display: inline-block;
  padding: 8px 18px;
  border-radius: 999px;
  background: rgba(255, 255, 255, 0.22);
  border: 1px solid rgba(255, 255, 255, 0.35);
  color: #ffffff;
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: background 0.15s ease;
}
.nav-link:hover {
  background: rgba(255, 255, 255, 0.34);
}
.nav-link.active {
  background: rgba(255, 255, 255, 0.85);
  color: #0f2d50;
}
.glass-card {
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(19px);
  -webkit-backdrop-filter: blur(19px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 22px;
  box-shadow: 0 12px 40px rgba(15, 45, 80, 0.25);
  padding: 28px 32px;
  margin-bottom: 28px;
}
.empty-message {
  text-align: center;
  color: #ffffff;
  font-size: 1.1rem;
  margin: 20px 0;
}
.app-credit {
  position: fixed;
  left: 16px;
  bottom: 14px;
  font-size: 0.7rem;
  color: #ffffff;
  opacity: 0.85;
  z-index: 10;
}
.app-install-note {
  position: fixed;
  right: 16px;
  bottom: 14px;
  max-width: 240px;
  font-size: 0.68rem;
  line-height: 1.35;
  text-align: right;
  color: #ffffff;
  background: rgba(0, 0, 0, 0.25);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 12px;
  padding: 8px 12px;
  z-index: 10;
}
@media (max-width: 640px) {
  .app-shell {
    padding: 28px 16px 120px;
  }
  h1 {
    font-size: 1.5rem;
  }
  .glass-card {
    padding: 18px 16px;
    border-radius: 18px;
  }
  .app-credit,
  .app-install-note {
    position: static;
    max-width: 100%;
    text-align: left;
    margin: 10px 0 0;
  }
  .nav-link {
    padding: 7px 14px;
    font-size: 0.82rem;
  }
}


.controls-row {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 20px;
}
.control-group {
  display: flex;
  align-items: center;
  gap: 10px;
}
.control-group label {
  font-weight: 600;
  color: #0f2d50;
}
.filter-select {
  padding: 8px 14px;
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.55);
  font-size: 0.95rem;
  color: #0f2d50;
  cursor: pointer;
}
.apps-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
  gap: 22px;
}
.app-card {
  background: rgba(255, 255, 255, 0.28);
  backdrop-filter: blur(19px);
  -webkit-backdrop-filter: blur(19px);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 20px;
  box-shadow: 0 12px 32px rgba(15, 45, 80, 0.22);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.app-thumb {
  position: relative;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.app-thumb-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.app-thumb-initials {
  font-size: 2.2rem;
  font-weight: 700;
  color: rgba(255, 255, 255, 0.95);
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.25);
  letter-spacing: 1px;
}
.app-card-body {
  padding: 16px 18px 20px;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 10px;
}
.app-title {
  margin: 0;
  font-size: 1.1rem;
  color: #0f2d50;
}
.app-type-badge {
  display: inline-block;
  color: #fff;
  padding: 3px 12px;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 600;
}
.btn-details {
  margin-top: 4px;
  align-self: stretch;
  padding: 9px 16px;
  border-radius: 12px;
  border: 1px solid rgba(15, 45, 80, 0.15);
  background: rgba(255, 255, 255, 0.7);
  color: #0f2d50;
  font-weight: 600;
  font-size: 0.9rem;
  cursor: pointer;
  transition: background 0.15s ease, box-shadow 0.15s ease;
}
.btn-details:hover {
  background: #ffffff;
  box-shadow: 0 4px 14px rgba(15, 45, 80, 0.2);
}
.btn-details:active {
  background: rgba(255, 225, 150, 0.9);
  box-shadow: 0 0 0 3px rgba(255, 177, 77, 0.5);
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(10, 25, 45, 0.45);
  backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  z-index: 100;
}
.modal-overlay[hidden] {
  display: none;
}
.modal-card {
  position: relative;
  max-width: 460px;
  width: 100%;
  background: rgba(255, 255, 255, 0.85);
}
.modal-close {
  position: absolute;
  top: 14px;
  right: 16px;
  border: none;
  background: transparent;
  font-size: 1.4rem;
  line-height: 1;
  color: #0f2d50;
  cursor: pointer;
}
.modal-title {
  margin: 0 0 10px;
  color: #0f2d50;
  font-size: 1.3rem;
  padding-right: 24px;
}
.modal-description {
  color: #1c2b3a;
  line-height: 1.5;
  margin: 14px 0 10px;
}
.modal-date {
  color: #2c4a68;
  font-size: 0.85rem;
  font-weight: 600;
}
@media (max-width: 640px) {
  .controls-row {
    flex-direction: column;
    align-items: flex-start;
    gap: 12px;
  }
  .control-group {
    width: 100%;
  }
  .filter-select {
    flex: 1;
  }
  .apps-grid {
    grid-template-columns: 1fr;
  }
  .modal-card {
    max-width: 100%;
  }
}

</style>
</head>
<body>

<div class="background">
  <svg width="100%" height="100%" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="petal1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#ffe27a"/>
        <stop offset="50%" stop-color="#ffb14d"/>
        <stop offset="100%" stop-color="#e2622a"/>
      </linearGradient>
      <linearGradient id="petal2" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#ffb14d"/>
        <stop offset="100%" stop-color="#e2622a"/>
      </linearGradient>
    </defs>
    <path d="M 1440 0 C 1100 100, 1000 350, 1250 550 C 1450 700, 1500 300, 1440 0 Z" fill="url(#petal1)" opacity="0.9"/>
    <path d="M 0 900 C 250 750, 500 850, 450 650 C 400 450, 100 550, 0 900 Z" fill="url(#petal2)" opacity="0.92"/>
    <path d="M 1440 900 C 1250 700, 950 800, 1050 650 C 1150 500, 1400 600, 1440 900 Z" fill="url(#petal1)" opacity="0.9"/>
    <path d="M 0 0 C 150 200, 350 100, 250 -50 C 150 -150, -50 -100, 0 0 Z" fill="url(#petal2)" opacity="0.85"/>
  </svg>
</div>

<div class="app-shell">
  <div class="nav-links">
    <a href="index.html" class="nav-link">Dashboard usage</a>
    <a href="applications.html" class="nav-link active">Mes applications</a>
  </div>
  <h1>Mes applications Claude Code</h1>

  <div class="glass-card">
    <div class="controls-row">
      <div class="control-group">
        <label for="type-filter">Type</label>
        <select id="type-filter" class="filter-select"></select>
      </div>
      <div class="control-group">
        <label for="name-filter">Projet</label>
        <select id="name-filter" class="filter-select"></select>
      </div>
    </div>
  </div>

  <div id="apps-grid" class="apps-grid"></div>
  <p id="apps-empty" class="empty-message" hidden>Aucune application ne correspond à ce filtre.</p>

  <div id="app-modal" class="modal-overlay" hidden>
    <div class="modal-card glass-card">
      <button type="button" class="modal-close" id="modal-close" aria-label="Fermer">&times;</button>
      <div id="modal-body"></div>
    </div>
  </div>

  
  <p class="app-credit">Réalisé par IsabelleWeb13@</p>
  <p class="app-install-note">Cette application peut être installée chez vous : copiez le dossier de scripts (README + install + hooks + dashboard).</p>

</div>

<script>
const APPS = [{"name": "ma-calculette", "type": "Outil", "description": "Calculatrice statique HTML/CSS/JS avec effets sonores (Web Audio API) et fonds glassmorphism en rotation automatique.", "date": "04/07/2026"}, {"name": "dashboard", "type": "Outil", "description": "Dashboard glassmorphism qui visualise l'usage (tokens, coût estimé) des sessions Claude Code, par projet.", "date": "05/07/2026"}, {"name": "automatisation-email-brouillon", "type": "Automatisation", "description": "Cloud Function GCP (Python) qui détecte les emails de création de dossier reçus sur Gmail et crée automatiquement un brouillon de demande d'entretien pour le bénéficiaire identifié.", "date": "06/07/2026"}];

function hashString(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    hash = (hash << 5) - hash + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

function colorForApp(app) {
  if (app.name === 'dashboard') return 'hsl(330, 75%, 60%)';
  const hue = hashString(app.type || app.name) % 360;
  if (hue >= 285 && hue <= 350) return '#000000';
  return `hsl(${hue}, 68%, 55%)`;
}

function initials(name) {
  const parts = name.split(/[^a-zA-Z0-9À-ÿ]+/).filter(Boolean);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.slice(0, 2).toUpperCase();
}

function distinctSorted(values) {
  return Array.from(new Set(values)).sort((a, b) => a.localeCompare(b, 'fr'));
}

const typeFilter = document.getElementById('type-filter');
const nameFilter = document.getElementById('name-filter');
const grid = document.getElementById('apps-grid');
const emptyMsg = document.getElementById('apps-empty');
const modal = document.getElementById('app-modal');
const modalBody = document.getElementById('modal-body');
const modalClose = document.getElementById('modal-close');

function fillDropdown(select, values, allLabel) {
  const optAll = document.createElement('option');
  optAll.value = '__TOUS__';
  optAll.textContent = allLabel;
  select.appendChild(optAll);
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    select.appendChild(opt);
  });
  select.value = '__TOUS__';
}

fillDropdown(typeFilter, distinctSorted(APPS.map(a => a.type)), 'Tous les types');
fillDropdown(nameFilter, distinctSorted(APPS.map(a => a.name)), 'Tous les projets');

function openModal(app) {
  modalBody.innerHTML = `
    <h2 class="modal-title">${app.name}</h2>
    <span class="app-type-badge" style="background:${colorForApp(app)};">${app.type}</span>
    <p class="modal-description">${app.description}</p>
    <p class="modal-date">Réalisé le ${app.date}</p>
  `;
  modal.hidden = false;
}

function closeModal() {
  modal.hidden = true;
}

modalClose.addEventListener('click', closeModal);
modal.addEventListener('click', (e) => {
  if (e.target === modal) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && !modal.hidden) closeModal();
});

function renderGrid() {
  const typeVal = typeFilter.value;
  const nameVal = nameFilter.value;
  const filtered = APPS.filter(a =>
    (typeVal === '__TOUS__' || a.type === typeVal) &&
    (nameVal === '__TOUS__' || a.name === nameVal)
  );

  if (filtered.length === 0) {
    grid.innerHTML = '';
    emptyMsg.hidden = false;
    return;
  }
  emptyMsg.hidden = true;

  grid.innerHTML = filtered.map((app, i) => `
    <div class="app-card">
      <div class="app-thumb" style="background: linear-gradient(135deg, ${colorForApp(app)}, rgba(255,255,255,0.15));">
        <span class="app-thumb-initials">${initials(app.name)}</span>
        ${app.image ? `<img class="app-thumb-img" src="${app.image}" alt="" onerror="this.style.display='none'">` : ''}
      </div>
      <div class="app-card-body">
        <h3 class="app-title">${app.name}</h3>
        <span class="app-type-badge" style="background:${colorForApp(app)};">${app.type}</span>
        <button type="button" class="btn-details" data-index="${i}">Détails</button>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.btn-details').forEach(btn => {
    btn.addEventListener('click', () => openModal(filtered[Number(btn.dataset.index)]));
  });
}

typeFilter.addEventListener('change', renderGrid);
nameFilter.addEventListener('change', renderGrid);

renderGrid();
</script>
</body>
</html>
